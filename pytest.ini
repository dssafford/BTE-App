[pytest]
pythonpath = BTE_APP_backend
# Only collect the project's own tests. lambda_build/ is a packaged Lambda
# bundle of vendored dependencies; some ship their own test files (e.g.
# sniffio) whose basenames collide with the installed packages and break
# collection when pytest is run from the repo root.
testpaths = BTE_APP_backend/tests
norecursedirs = BTE_APP_backend/lambda_build
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
